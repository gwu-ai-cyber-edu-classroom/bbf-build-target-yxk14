<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ quiz['title'] }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 3rem auto; padding: 0 1rem; }
    .q { margin: 1.2rem 0; padding: .8rem 1rem; border: 1px solid #ddd; border-radius: .5rem; }
    .q p { font-weight: 600; margin: 0 0 .5rem; }
    label { display: block; margin: .2rem 0; }
    #result { margin-top: 1rem; font-weight: 600; }
    button { padding: .5rem 1rem; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>{{ quiz['title'] }}</h1>
  <form id="quizForm">
    {% for q in questions %}
      <div class="q">
        <p>{{ q['position'] + 1 }}. {{ q['text'] }}</p>
        {% for opt in q['options'] %}
          <label>
            <input type="radio" name="q{{ q['position'] }}" value="{{ loop.index0 }}" required>
            {{ opt }}
          </label>
        {% endfor %}
      </div>
    {% endfor %}
    <button type="submit">Submit</button>
  </form>
  <div id="result"></div>

  <script>
    // The page only ever sends option indices and shows the score + right/wrong.
    // It never receives or displays the correct answers or any secret.
    const quizId = {{ quiz['id'] }};
    const token = {{ token | tojson }};
    const nQuestions = {{ questions | length }};

    document.getElementById("quizForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const answers = [];
      for (let i = 0; i < nQuestions; i++) {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        answers.push(sel ? parseInt(sel.value, 10) : -1);
      }
      let url = `/api/quiz/${quizId}/submit`;
      if (token) url += `?token=${encodeURIComponent(token)}`;
      const resp = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({answers}),
      });
      const out = document.getElementById("result");
      if (!resp.ok) {
        out.textContent = "Submission error (" + resp.status + ").";
        return;
      }
      const data = await resp.json();
      out.textContent = `Score: ${data.score} / ${data.total}`;
    });
  </script>
</body>
</html>
